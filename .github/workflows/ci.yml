name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: setup rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: install dependencies
      run: npm ci

    - name: build
      run: npm run build

    - name: release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
      run: npm run release

    # On PRs, dry-run semantic-release and comment the next version
    - name: preview release version
      if: github.event_name == 'pull_request'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        OUTPUT=$(npx semantic-release --dry-run 2>&1) || true
        VERSION=$(echo "$OUTPUT" | grep -oP 'next release version is \K[0-9]+\.[0-9]+\.[0-9]+' || echo "")
        if [ -n "$VERSION" ]; then
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "This PR will release **v${VERSION}**"
        fi
